# Supabase project configuration.
# This file makes the project's schema reproducible from the repo:
#   `supabase db reset`  → replays every migration in supabase/migrations/ from scratch
#   `supabase db push`   → applies pending migrations to the linked remote
#   `supabase migration new <name>` → creates a new versioned migration
#
# Link once per machine (interactive, run by a human):
#   supabase login
#   supabase link --project-ref jpojusluihjjsjvcubdp

project_id = "jpojusluihjjsjvcubdp"

[db]
# Must match the production engine (Postgres 17).
major_version = 17

[db.migrations]
# Migrations live in supabase/migrations/ and are the single source of truth.
schema_paths = []
