name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Never run two pipelines for the same ref at once; never cancel an in-flight
# production migration.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

# Run JS-based actions (e.g. supabase/setup-cli) on Node 24 so the Node 20
# deprecation warning stops annotating every run. Safe before the June 2026 flip.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Code gates ───────────────────────────────────────────────────────────
  checks:
    name: Type check, Tests & Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      AI_KEY_ENCRYPTION_SECRET: ${{ secrets.AI_KEY_ENCRYPTION_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: src
        run: pnpm exec prisma generate

      - name: TypeScript check
        working-directory: src
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        working-directory: src
        run: pnpm test -- --reporter=verbose

      - name: Build
        working-directory: src
        run: pnpm run build

  # ── 1b. Authenticated E2E (Playwright) ───────────────────────────────────────
  # Builds the app, starts it, and runs the authenticated Playwright specs against
  # the seeded test user. The specs `test.skip` themselves when E2E_USER_EMAIL /
  # E2E_USER_PASSWORD are absent, so this job stays green until those secrets are
  # added — adding them (pointing at the seeded user) turns the suite live.
  e2e:
    name: E2E (authenticated)
    needs: [checks]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AI_KEY_ENCRYPTION_SECRET: ${{ secrets.AI_KEY_ENCRYPTION_SECRET }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: src
        run: pnpm exec prisma generate

      - name: Install Playwright browsers
        working-directory: src
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        working-directory: src
        run: pnpm run build

      - name: Start app & wait for it
        working-directory: src
        run: |
          pnpm start &
          npx --yes wait-on -t 120000 http://localhost:3000

      - name: Run authenticated E2E
        working-directory: src
        run: pnpm e2e

  # ── 2. Migration validation (antierrores) ───────────────────────────────────
  # Boots a fresh local Supabase stack and replays EVERY migration from zero.
  # A broken, out-of-order, or non-idempotent migration fails here — long before
  # production is touched. Runs on every PR and push.
  migrate-validate:
    name: Validate migrations (replay from scratch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local stack (applies all migrations to a fresh DB)
        run: supabase start

      - name: Replay from zero (db reset)
        run: supabase db reset

      - name: Check Prisma↔SQL drift (S0/DT-4)
        run: |
          # Verify that schema.prisma matches the applied migrations (drift detection).
          # supabase db push --dry-run with the local stack's DB URL exits 0 if no changes needed.
          # `supabase status` can exit non-zero when secondary services (imgproxy, pooler)
          # show as stopped even though Postgres itself is up and the DB URL is valid -
          # capture its output with `|| true` so that doesn't abort the step under pipefail.
          STATUS_OUTPUT="$(supabase status || true)"
          echo "$STATUS_OUTPUT" | grep -i "db url"
          # Extract the local DB URL from supabase status output
          LOCAL_DB_URL=$(echo "$STATUS_OUTPUT" | grep "DB URL:" | awk -F': ' '{print $2}')
          if [ -z "$LOCAL_DB_URL" ]; then
            echo "::error::Could not extract local DB URL from supabase status"
            exit 1
          fi
          echo "Testing drift against: $LOCAL_DB_URL"
          supabase db push --db-url "$LOCAL_DB_URL" --dry-run

      - name: Stop local stack
        if: always()
        run: supabase stop --no-backup

  # ── 3. Apply migrations to PRODUCTION (automatic) ────────────────────────────
  # Only on a real push to the production branch, and only after BOTH the code
  # gates and the from-scratch validation pass. Uses `--db-url` so it needs NO
  # Supabase access token / login — it reuses the DATABASE_URL secret the CI
  # already uses. `db push` is idempotent: it applies only the migrations not yet
  # recorded in the remote history.
  #
  # IMPORTANT: migrations run DDL, so MIGRATION_DB_URL must be a DIRECT / session
  # connection (port 5432), NOT the transaction pooler (port 6543). If your
  # DATABASE_URL is the pooler, add a SUPABASE_DB_URL secret with the direct URL.
  migrate-deploy:
    name: Apply migrations to production
    needs: [checks, migrate-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: prod-migrate
      cancel-in-progress: false
    env:
      MIGRATION_DB_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Require a database URL
        run: |
          if [ -z "$MIGRATION_DB_URL" ]; then
            echo "::error::No database URL available. Set DATABASE_URL (or SUPABASE_DB_URL for the direct connection) in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Preview pending migrations (dry run)
        run: supabase db push --db-url "$MIGRATION_DB_URL" --dry-run

      - name: Apply pending migrations
        run: supabase db push --db-url "$MIGRATION_DB_URL"
